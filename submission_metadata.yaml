# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and debugging.
  Used GitHub Copilot for autocomplete during development.
  No candidate data was fed to any external LLM API.
  All explanations are generated using template-based NLG (no external API calls).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-factor candidate ranking system combining skill matching, semantic
  similarity, experience alignment, education scoring, achievement analysis,
  and platform behavioral signals. Uses sentence-transformers for embeddings
  with random-projection fallback, TF-IDF + fuzzy matching for skills, and
  a weighted composite score. Redrob platform signals (response rate, open
  to work flag, GitHub activity, recruiter engagement) provide behavioral
  context. Template-based NLG generates natural language explanations.
  Runtime is under 5 minutes for 50K candidates on CPU.

